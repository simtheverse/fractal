# Multi-rate bus communication: Sensor + Follower + Counter
# Rate configuration is applied programmatically via set_rate_config();
# this fragment defines the partition topology. When a_fast_sensor is set
# to rate 4, b_follower at rate 1 sees only the last reading per outer
# tick (LatestValue semantic).
#
# Partition IDs prefixed to control BTreeMap stepping order.

[system]
timestep = 1.0

[partitions.a_fast_sensor]
implementation = "Sensor"
scale = 1.0
offset = 0.0

[partitions.b_follower]
implementation = "Follower"
threshold = 3.0

[partitions.c_counter]
implementation = "Counter"
